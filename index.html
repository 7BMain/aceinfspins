<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roblox Profile Viewer</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #121212;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: #1e1e1e;
      padding: 30px;
      border-radius: 20px;
      width: 350px;
      text-align: center;
      box-shadow: 0 8px 25px rgba(0,0,0,0.4);
    }

    img {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      margin: 15px 0;
      border: 4px solid #333;
    }

    h1 {
      margin: 10px 0;
      font-size: 28px;
    }

    .display-name {
      color: #aaa;
      font-size: 18px;
      margin-bottom: 10px;
    }

    .bio {
      background: #2a2a2a;
      padding: 12px;
      border-radius: 12px;
      margin-top: 15px;
    }

    .userid {
      margin-top: 15px;
      color: #888;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="card" id="profile">
    Loading profile...
  </div>

  <script>
    async function loadProfile() {
      const userId = 4499126053;

      try {
        const profileRes = await fetch(`https://users.roblox.com/v1/users/${userId}`);
        const profileData = await profileRes.json();

        const avatarRes = await fetch(
          `https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=${userId}&size=420x420&format=Png&isCircular=false`
        );
        const avatarData = await avatarRes.json();

        document.getElementById("profile").innerHTML = `
          <h1>${profileData.name}</h1>
          <div class="display-name">@${profileData.displayName}</div>
          <img src="${avatarData.data[0].imageUrl}" alt="Avatar">
          <div class="bio">
            ${profileData.description || "No description set."}
          </div>
          <div class="userid">User ID: ${profileData.id}</div>
        `;
      } catch (error) {
        document.getElementById("profile").innerHTML = "Failed to load profile.";
      }
    }

    loadProfile();
  </script>
</body>
</html>
